<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{TITLE}}</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161922;
    --panel-2: #1c2030;
    --border: #2a2f3d;
    --text: #e6e8ee;
    --muted: #8a93a6;
    --accent: #7aa2f7;
    --ok: #10b981;
    --warn: #f59e0b;
    --err: #ef4444;
    --t0: #10b981;
    --t1: #f59e0b;
    --t2: #ef4444;
    --t3: #8b5cf6;
    --t-baseline: #64748b;
    --t-unknown: #6b7280;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI",
          Helvetica, Arial, sans-serif;
  }
  header {
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    background: var(--panel); position: sticky; top: 0; z-index: 4;
  }
  header h1 {
    font-size: 14px; font-weight: 600; margin: 0;
    padding-right: 10px; border-right: 1px solid var(--border);
  }
  header .sub { color: var(--muted); font-size: 12px; }
  .sel {
    display: flex; align-items: center; gap: 4px;
    font-size: 12px; color: var(--muted);
  }
  .sel select {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 3px 6px; font-size: 12px; font-family: var(--mono);
  }
  .sel select:focus { outline: 1px solid var(--accent); }
  header .spacer { flex: 1 0 auto; }
  header button.toggle {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 4px 10px; font: 11px var(--mono); cursor: pointer;
  }
  header button.toggle:hover {
    border-color: var(--accent); color: var(--accent);
  }
  header button.toggle.active {
    background: rgba(122,162,247,.15);
    border-color: var(--accent); color: var(--accent);
  }
  .pill {
    padding: 2px 8px; border-radius: 10px; font-size: 11px;
    font-family: var(--mono); border: 1px solid var(--border);
    background: var(--panel-2);
  }
  .pill.ok { background: rgba(16,185,129,.15); border-color: var(--ok); color: var(--ok); }
  .pill.err { background: rgba(239,68,68,.15); border-color: var(--err); color: var(--err); }
  .pill.warn { background: rgba(245,158,11,.15); border-color: var(--warn); color: var(--warn); }

  #banner {
    padding: 8px 14px; font-size: 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  #banner.ok { background: rgba(16,185,129,.08); color: #a7f3d0; }
  #banner.err { background: rgba(239,68,68,.08); color: #fecaca; }
  #banner.warn { background: rgba(245,158,11,.08); color: #fde68a; }
  #banner code { font-family: var(--mono); }

  main {
    display: grid; grid-template-columns: 1fr 380px;
    height: calc(100vh - 94px);
  }
  #canvas {
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    background:
      radial-gradient(circle at 10% 10%, rgba(122,162,247,.04), transparent 40%),
      radial-gradient(circle at 90% 90%, rgba(139,92,246,.04), transparent 40%),
      var(--bg);
  }
  /* Each pane is a fully-self-contained tree viewer (label + SVG + tools).
     A second pane is grafted in below the first when compare mode is on. */
  .pane {
    position: relative; flex: 1 1 0; min-height: 0;
    border-bottom: 1px solid var(--border);
  }
  .pane:last-child { border-bottom: none; }
  .pane.hidden { display: none; }
  .pane > svg { width: 100%; height: 100%; display: block; cursor: grab; }
  .pane > svg:active { cursor: grabbing; }
  .pane .pane-label {
    position: absolute; top: 10px; right: 14px; z-index: 3;
    display: flex; align-items: center; gap: 8px;
    padding: 3px 9px; border-radius: 999px;
    background: rgba(15,17,21,.85); border: 1px solid var(--border);
    font: 10px var(--mono); color: var(--muted);
    text-transform: uppercase; letter-spacing: .08em;
  }
  .pane .pane-label .arm-tag {
    color: var(--text); font-weight: 600;
    padding: 1px 6px; border-radius: 3px;
    background: var(--panel-2); border: 1px solid var(--border);
  }
  .pane .pane-label .arm-tag.baseline {
    color: var(--t-baseline); border-color: var(--t-baseline);
  }
  .pane .pane-label .arm-tag.mesmer {
    color: var(--accent); border-color: var(--accent);
  }
  .pane .pane-toolbar {
    position: absolute; top: 10px; left: 10px;
    display: flex; gap: 6px; z-index: 2;
  }
  .pane .pane-toolbar button {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 4px 9px; font: 11px var(--mono); cursor: pointer;
  }
  .pane .pane-toolbar button:hover {
    border-color: var(--accent); color: var(--accent);
  }
  .pane .pane-empty {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; color: var(--muted); text-align: center;
    padding: 24px; font-family: var(--mono); font-size: 12px;
    pointer-events: none;
  }

  .node circle, .node rect { stroke-width: 1.5px; transition: r 120ms; }
  .node { cursor: pointer; }
  .node:hover circle { r: 16; }

  .node.failed circle,
  .node.blocked circle { stroke-dasharray: 3 2; opacity: .7; }

  /* Selection — the user's interaction signal MUST dominate winner glow.
     Bright cyan ring + drop-shadow so a click is unmistakable, even when
     the clicked node is also the winning one. */
  .node.selected circle {
    stroke: var(--accent); stroke-width: 3.5px;
    filter: drop-shadow(0 0 8px var(--accent));
  }
  .node.selected rect {
    stroke: var(--accent); stroke-width: 3.5px;
    filter: drop-shadow(0 0 8px var(--accent));
  }

  /* Winning marker — gold ring + ★ badge instead of a permanent halo.
     Smaller, off to the side, doesn't compete with selection. */
  .node.winning circle {
    stroke: #fbbf24; stroke-width: 2.5px;
  }
  .node .winner-badge {
    fill: #fbbf24; font-size: 11px; font-weight: 700;
    pointer-events: none;
  }

  .node text { fill: var(--text); font-size: 11px; font-family: var(--mono); pointer-events: none; }
  .node .badge { font-size: 12px; }
  .node.leader rect { filter: drop-shadow(0 0 4px rgba(255,255,255,.35)); }
  /* Sequence number on actually-ran modules — shows the leader's call order. */
  .node .seq-num {
    fill: var(--muted); font-size: 9px; font-family: var(--mono);
    pointer-events: none;
  }
  /* The synthetic LEADER orchestrator node — diamond-ish, sits between
     root and the per-call sub-modules. Distinct from the leader-verdict
     square (which is the leader's CONCLUDE node at run end). */
  .node.leader-orchestrator polygon {
    fill: var(--accent); fill-opacity: 0.15;
    stroke: var(--accent); stroke-width: 2px;
  }
  .node.leader-orchestrator text { fill: var(--accent); font-weight: 600; }

  .link { fill: none; stroke: var(--border); stroke-width: 1.2px; }
  .link.on-winning-path { stroke: #fff; stroke-width: 1.8px; opacity: .8; }

  #detail {
    border-left: 1px solid var(--border);
    background: var(--panel); overflow-y: auto;
    padding: 14px; font-size: 12px;
  }
  #detail h2 {
    margin: 0 0 4px 0; font-size: 14px; font-family: var(--mono);
    color: var(--accent);
  }
  #detail .row {
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid var(--border); padding: 6px 0;
    color: var(--muted); font-size: 11px;
  }
  #detail .row b { color: var(--text); font-family: var(--mono); font-weight: 500; }
  #detail .row b.long {
    text-align: right; max-width: 60%;
    word-break: break-all; white-space: normal; line-height: 1.4;
  }
  #detail section { margin-top: 14px; }
  #detail section h3 {
    margin: 0 0 6px 0; font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .06em; font-weight: 600;
    display: flex; align-items: center; justify-content: space-between;
  }
  #detail section h3 .h-tag {
    font-family: var(--mono); font-size: 10px; color: var(--muted);
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 3px; padding: 1px 5px; letter-spacing: .04em;
    text-transform: none;
  }
  #detail .msg {
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 5px; padding: 7px 9px; font-family: var(--mono);
    font-size: 11px; margin-bottom: 6px; white-space: pre-wrap;
    word-break: break-word; line-height: 1.55;
  }
  #detail .msg.me { border-left: 2px solid var(--accent); }
  #detail .msg.them { border-left: 2px solid #a78bfa; }
  #detail .msg .lbl {
    display: block; color: var(--muted); font-size: 10px;
    letter-spacing: .05em; text-transform: uppercase; margin-bottom: 3px;
  }
  #detail .empty { color: var(--muted); font-style: italic; font-size: 11px; }
  #detail .leaked {
    background: rgba(16,185,129,.08); border: 1px solid var(--ok);
    color: #a7f3d0; padding: 6px 8px; border-radius: 5px;
    font-family: var(--mono); font-size: 11px; word-break: break-word;
  }
  #detail .info-banner {
    background: rgba(245,158,11,.08); border: 1px solid var(--warn);
    color: #fde68a; padding: 8px 10px; border-radius: 5px;
    margin-bottom: 12px; font-size: 11px; line-height: 1.55;
  }
  #detail .info-banner b {
    display: block; font-family: var(--mono); font-size: 11px;
    color: var(--warn); margin-bottom: 4px; letter-spacing: .04em;
  }
  /* Banner for the winning node — same shape, OK styling. */
  #detail .winner-banner {
    background: rgba(251,191,36,.08); border: 1px solid #fbbf24;
    color: #fde68a; padding: 8px 10px; border-radius: 5px;
    margin-bottom: 12px; font-size: 11px;
  }
  #detail .winner-banner b {
    display: block; font-family: var(--mono); font-size: 11px;
    color: #fbbf24; margin-bottom: 4px; letter-spacing: .04em;
  }
  #detail pre {
    background: var(--panel-2); border: 1px solid var(--border);
    padding: 6px 8px; border-radius: 4px; font-size: 11px;
    white-space: pre-wrap; word-break: break-word; margin: 0;
    max-height: 280px; overflow-y: auto;
  }
  #detail details {
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 4px; padding: 4px 8px; margin-bottom: 6px;
  }
  #detail details > summary {
    cursor: pointer; font-family: var(--mono); font-size: 11px;
    color: var(--muted); padding: 2px 0;
  }
  #detail details > summary:hover { color: var(--accent); }
  #detail details[open] > summary { color: var(--text); }
  #detail details > pre {
    margin-top: 6px; border: none; padding: 0; background: transparent;
  }

  .tier-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 5px; vertical-align: middle;
  }

  footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 10px; background: var(--panel);
    border-top: 1px solid var(--border); font-size: 10px;
    color: var(--muted); font-family: var(--mono);
  }

  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%;
    color: var(--muted); text-align: center; padding: 24px;
    font-family: var(--mono); font-size: 12px;
  }
</style>
</head>
<body>

<header>
  <h1>{{HEADER_TITLE}}</h1>
  <span class="sub" id="meta-sub"></span>
  <span class="spacer"></span>
  <div class="sel"><span>target</span><select id="sel-target"></select></div>
  <div class="sel" id="sel-arm-wrap"><span>arm</span><select id="sel-arm"></select></div>
  <div class="sel"><span>row</span><select id="sel-row"></select></div>
  <div class="sel"><span>seed</span><select id="sel-seed"></select></div>
  <button class="toggle" id="btn-compare" title="Show baseline + mesmer side-by-side for the selected row">Compare</button>
</header>

<div id="banner" class="warn"><span>Select a trial to render.</span></div>

<main>
  <div id="canvas">
    <!-- Pane A is always present. Pane B appears below when compare mode is on. -->
    <div class="pane" data-pane="A">
      <span class="pane-label"><span class="arm-tag" id="paneA-arm">—</span><span id="paneA-info"></span></span>
      <div class="pane-toolbar">
        <button data-act="fit" data-pane="A">Fit</button>
        <button data-act="expand" data-pane="A">Expand all</button>
        <button data-act="collapse" data-pane="A">Collapse</button>
      </div>
      <svg></svg>
    </div>
    <div class="pane hidden" data-pane="B">
      <span class="pane-label"><span class="arm-tag" id="paneB-arm">—</span><span id="paneB-info"></span></span>
      <div class="pane-toolbar">
        <button data-act="fit" data-pane="B">Fit</button>
        <button data-act="expand" data-pane="B">Expand all</button>
        <button data-act="collapse" data-pane="B">Collapse</button>
      </div>
      <svg></svg>
    </div>
  </div>
  <aside id="detail">
    <div class="empty-state">Click a node to inspect it.</div>
  </aside>
</main>

<footer>
  <span id="legend">
    <span class="tier-dot" style="background:var(--t0)"></span>T0
    <span class="tier-dot" style="background:var(--t1); margin-left:6px"></span>T1
    <span class="tier-dot" style="background:var(--t2); margin-left:6px"></span>T2
    <span class="tier-dot" style="background:var(--t3); margin-left:6px"></span>T3
    <span class="tier-dot" style="background:var(--t-baseline); margin-left:10px"></span>baseline
    <span style="display:inline-block;width:9px;height:9px;margin:0 4px 0 14px;vertical-align:middle;background:var(--ok);border:1px solid rgba(255,255,255,.3);border-radius:1px"></span>leader ✓
    <span style="display:inline-block;width:9px;height:9px;margin:0 4px 0 10px;vertical-align:middle;background:var(--err);border:1px solid rgba(255,255,255,.3);border-radius:1px"></span>leader ✗
    <span style="margin-left:14px;color:#fbbf24">★ winner</span>
  </span>
  <span id="footer-info"></span>
</footer>

<script type="application/json" id="bench-data">{{BENCH_DATA_JSON}}</script>

{{D3_SCRIPT_TAG}}

<script>
/* eslint-disable */
(() => {
  const TIER_COLOR = {
    0: "var(--t0)", 1: "var(--t1)", 2: "var(--t2)", 3: "var(--t3)",
  };
  const UNKNOWN_COLOR = "var(--t-unknown)";
  const BASELINE_COLOR = "var(--t-baseline)";

  const data = JSON.parse(document.getElementById("bench-data").textContent);
  const MODULES = (data.meta && data.meta.modules) || {};
  document.getElementById("meta-sub").textContent =
    `${data.meta.spec || "bench"} · ${data.meta.version || ""} · run ${data.meta.date || ""} · ${data.trials.length} trials`;
  document.getElementById("footer-info").textContent =
    `module: ${data.meta.module || "?"}  ·  dataset sha256: ${(data.meta.dataset_sha256 || "").slice(0,12)}…`;

  /* ---------- cascade selectors ---------- */

  const selT = document.getElementById("sel-target");
  const selA = document.getElementById("sel-arm");
  const selR = document.getElementById("sel-row");
  const selS = document.getElementById("sel-seed");
  const selArmWrap = document.getElementById("sel-arm-wrap");
  const btnCompare = document.getElementById("btn-compare");

  let _compare = false;

  function uniq(xs) { return Array.from(new Set(xs)); }
  function displayVal(v) {
    // Baselines have seed=null; render as "—" so the dropdown isn't misleading.
    if (v == null || v === "null" || v === "") return "—";
    return String(v);
  }
  function populate(sel, values, current) {
    sel.innerHTML = "";
    for (const v of values) {
      const opt = document.createElement("option");
      opt.value = String(v); opt.textContent = displayVal(v);
      sel.appendChild(opt);
    }
    if (current != null && values.map(String).includes(String(current))) sel.value = String(current);
  }

  function refreshCascade(preferred = {}) {
    const trials = data.trials;
    const targets = uniq(trials.map(t => t.target));
    populate(selT, targets, preferred.target);
    const cur1 = trials.filter(t => t.target === selT.value);

    const arms = uniq(cur1.map(t => t.arm));
    // Prefer "mesmer" over "baseline" on first paint — that's the arm
    // with a graph to explore. Users who actively pick baseline keep it.
    const defaultArm = preferred.arm ?? (arms.includes("mesmer") ? "mesmer" : arms[0]);
    populate(selA, arms, defaultArm);
    const cur2 = cur1.filter(t => t.arm === selA.value);

    const rows = uniq(cur2.map(t => t.sample_id));
    populate(selR, rows, preferred.sample_id);
    const cur3 = cur2.filter(t => t.sample_id === selR.value);

    const seeds = uniq(cur3.map(t => t.seed));
    populate(selS, seeds, preferred.seed);
  }

  function findTrial({target, arm, sample_id, seed}) {
    return data.trials.find(t =>
      t.target === target &&
      t.arm === arm &&
      t.sample_id === sample_id &&
      String(t.seed) === String(seed)
    );
  }

  function findFirstTrialForArm({target, arm, sample_id}) {
    // For baseline (seed=null) or whenever a seed is irrelevant we just
    // grab the first matching trial for (target, arm, sample_id).
    return data.trials.find(t =>
      t.target === target && t.arm === arm && t.sample_id === sample_id
    );
  }

  function currentMainTrial() {
    return findTrial({
      target: selT.value, arm: selA.value,
      sample_id: selR.value, seed: selS.value,
    });
  }

  for (const sel of [selT, selA, selR, selS]) {
    sel.addEventListener("change", () => {
      // Reset downstream selectors to first-valid each time.
      if (sel === selT) refreshCascade({ target: selT.value });
      else if (sel === selA) refreshCascade({ target: selT.value, arm: selA.value });
      else if (sel === selR) refreshCascade({ target: selT.value, arm: selA.value, sample_id: selR.value });
      // seed only re-renders.
      renderCurrent();
    });
  }

  refreshCascade();

  /* ---------- compare-mode toggle ---------- */

  btnCompare.addEventListener("click", () => {
    _compare = !_compare;
    btnCompare.classList.toggle("active", _compare);
    btnCompare.textContent = _compare ? "Compare ✓" : "Compare";
    selArmWrap.style.display = _compare ? "none" : "";
    document.querySelector('.pane[data-pane="B"]').classList.toggle("hidden", !_compare);
    renderCurrent();
  });

  /* ---------- banner ---------- */

  function setBanner(trial) {
    const b = document.getElementById("banner");
    b.innerHTML = "";
    const make = (kind, html) => {
      b.className = kind;
      b.innerHTML = html;
    };
    if (!trial) { make("warn", "<span>No trial selected.</span>"); return; }
    if (trial.error) {
      make("warn",
        `<span class="pill warn">ERROR</span>
         <span>${esc(trial.error)}</span>
         <span class="spacer"></span>
         <span class="sub">trial ${trial.trial_id}</span>`);
      return;
    }
    if (trial.success) {
      const mod = trial.trace?.winning_module || (trial.arm === "baseline" ? "baseline" : "?");
      const tier = trial.trace?.winning_tier;
      const tierLbl = tier === 0 || tier ? `T${tier}` : (trial.arm === "baseline" ? "—" : "?");
      make("ok",
        `<span class="pill ok">SUCCESS</span>
         <span>won at turn ${trial.canary_turn} via <code>${esc(mod)}</code> (${tierLbl})</span>
         <span class="sub">matched: “${esc((trial.matched_text || "").slice(0, 60))}”</span>
         <span class="spacer"></span>
         <span class="sub">${trial.turns} turns · ${(trial.total_tokens?.total || 0).toLocaleString()} tok · ${trial.duration_s.toFixed(1)}s</span>`);
      return;
    }
    const scores = Object.entries(trial.trace?.per_module_scores || {});
    let best = { mod: "?", score: 0 };
    for (const [mod, arr] of scores) {
      const m = Math.max(0, ...arr);
      if (m > best.score) best = { mod, score: m };
    }
    make("err",
      `<span class="pill err">FAIL</span>
       <span>best score ${best.score} via <code>${esc(best.mod)}</code></span>
       <span class="spacer"></span>
       <span class="sub">${trial.turns} turns · ${(trial.total_tokens?.total || 0).toLocaleString()} tok · ${trial.duration_s.toFixed(1)}s</span>`);
  }

  /* ---------- per-pane render state ---------- */

  // Two panes share zoom state structure but render independent trees.
  // Each pane has its own d3 zoom behaviour, layers, and current trial.
  function makePaneState(paneEl) {
    const svg = d3.select(paneEl).select("svg");
    const zoomLayer = svg.append("g").attr("class", "zoom");
    const linkLayer = zoomLayer.append("g").attr("class", "links");
    const nodeLayer = zoomLayer.append("g").attr("class", "nodes");
    const zoom = d3.zoom()
      .scaleExtent([0.25, 4])
      .on("zoom", (ev) => zoomLayer.attr("transform", ev.transform));
    svg.call(zoom);
    return {
      paneEl, svg, zoomLayer, linkLayer, nodeLayer, zoom,
      collapsed: new Set(), trial: null, winId: null,
    };
  }
  const paneA = makePaneState(document.querySelector('.pane[data-pane="A"]'));
  const paneB = makePaneState(document.querySelector('.pane[data-pane="B"]'));

  // Last-clicked node id (could be from either pane). The detail panel
  // tracks it so a re-render doesn't reset the user's selection.
  let _selectedNodeId = null;
  let _selectedFromPane = null;

  /* ---------- d3 helpers shared across panes ---------- */

  function buildHierarchy(nodes, rootId, collapsed) {
    const seen = new Set();
    function build(id) {
      if (seen.has(id) || !nodes[id]) return null;
      seen.add(id);
      const n = nodes[id];
      const childIds = collapsed.has(id) ? [] : (n.children || []);
      return {
        ...n,
        _childIds: n.children || [],
        children: childIds.map(build).filter(Boolean),
      };
    }
    return build(rootId);
  }

  /* Leader-orchestration timeline.
   *
   * The persisted graph stores parent/child execution links. Visually that
   * can read as "target-profiler delegated to attack-planner", which is
   * wrong: the LEADER orchestrates every delegation and the modules don't
   * talk to each other.
   *
   * This synthesizer rebuilds the hierarchy as the user's mental model
   * actually maps:
   *
   *   root ─→ LEADER (synthetic) ─→ 1. target-profiler
   *                              ─→ 2. attack-planner
   *                              ─→ 3. <next ran module>
   *                              ─→ leader-verdict (square, terminator)
   *
   * Real delegations are SIBLINGS under LEADER, ordered by timestamp.
   * The leader-verdict is always the LAST child of LEADER regardless of
   * where the persisted graph attaches it. */
  function buildLeaderTimeline(nodes, rootId, collapsed) {
    if (!rootId || !nodes[rootId]) return null;
    const root = nodes[rootId];

    // Bucket all non-root nodes:
    const ranAttempts = [];
    let leaderVerdict = null;
    for (const [id, n] of Object.entries(nodes)) {
      if (id === rootId) continue;
      if (n.source === "leader") { leaderVerdict = n; continue; }
      ranAttempts.push(n);
    }

    // Order real delegations by timestamp — that's the leader's call
    // sequence. Numeric fallback to id when timestamp is missing keeps
    // the ordering deterministic for synthetic graphs.
    ranAttempts.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0)
                                || a.id.localeCompare(b.id));

    // Build the synthetic LEADER node carrying every real delegation
    // plus the leader-verdict terminator.
    const leaderId = "__leader__";
    const leaderChildren = ranAttempts.map((n, idx) => ({
      ...n,
      _childIds: n.children || [],
      _seqNum: idx + 1,                   // 1-based index for label
      children: [],
    }));
    if (leaderVerdict) {
      leaderChildren.push({
        ...leaderVerdict,
        _childIds: leaderVerdict.children || [],
        children: [],
      });
    }

    return {
      ...root,
      _childIds: root.children || [],
      children: [{
        id: leaderId,
        module: "leader",
        approach: "orchestrator — picks the next sub-module to delegate to",
        status: "alive",
        source: "synthetic",
        score: 0,
        depth: 1,
        parent_id: rootId,
        _isLeaderOrchestrator: true,
        _childIds: leaderChildren.map(c => c.id),
        children: leaderChildren,
        messages_sent: [],
        target_responses: [],
        leaked_info: "",
        module_output: "",
        reflection: "",
      }],
    };
  }

  function pickWinningNodeId(trial) {
    if (!trial || !trial.success || !trial.graph) return null;
    if (trial.arm === "baseline") {
      // Synthesized baseline tree has exactly one non-root node.
      const nonRoot = Object.keys(trial.graph.nodes).find(
        id => id !== trial.graph.root_id
      );
      return nonRoot || null;
    }
    const winMod = trial.trace?.winning_module;
    if (!winMod) return null;
    let best = null;
    for (const [id, n] of Object.entries(trial.graph.nodes)) {
      if (n.module !== winMod) continue;
      if (best == null || (n.score || 0) > (trial.graph.nodes[best].score || 0)) {
        best = id;
      }
    }
    return best;
  }

  function tierOf(trial, module) {
    if (module === "baseline") return null;
    return (trial.module_tiers || {})[module];
  }

  function colorFor(trial, node) {
    if (!node || node.module === "root") return UNKNOWN_COLOR;
    if (node.module === "baseline") return BASELINE_COLOR;
    const t = tierOf(trial, node.module);
    if (t === 0 || t === 1 || t === 2 || t === 3) return TIER_COLOR[t];
    return UNKNOWN_COLOR;
  }

  function isLeaderVerdict(node) {
    return node && node.source === "leader";
  }
  function leaderVerdictColor(node) {
    if (node.status === "promising") return "var(--ok)";
    if (node.status === "dead") return "var(--err)";
    return "var(--t-unknown)";
  }
  function shortLabel(node) {
    const mod = node.module || "?";
    const s = (node.score ?? 0);
    if (node._isLeaderOrchestrator) return "leader";
    if (mod === "root") return "root";
    if (isLeaderVerdict(node)) {
      const verdict = node.status === "promising"
        ? "✓ objective met"
        : node.status === "dead"
          ? "✗ no consolidation"
          : node.status;
      return `${mod} · ${verdict}`;
    }
    if (mod === "baseline") {
      return node.status === "promising"
        ? "baseline · ✓ matched"
        : "baseline · ✗ no match";
    }
    return `${mod} · s${s}`;
  }

  function esc(s) {
    if (s == null) return "";
    return String(s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function fitToView(pane, root) {
    const bbox = pane.nodeLayer.node().getBBox();
    const svgEl = pane.svg.node();
    const W = svgEl.clientWidth, H = svgEl.clientHeight;
    if (!W || !H) return;                   // pane hidden: skip
    const pad = 30;
    const scale = Math.min(
      (W - pad * 2) / Math.max(bbox.width, 1),
      (H - pad * 2) / Math.max(bbox.height, 1),
      1.2
    );
    const tx = (W - bbox.width * scale) / 2 - bbox.x * scale;
    const ty = (H - bbox.height * scale) / 2 - bbox.y * scale;
    pane.svg.transition().duration(300)
      .call(pane.zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  }

  function winningPathIds(trial, winId) {
    // In the timeline view, the rendered tree is root → LEADER → winner.
    // The raw graph's parent chain doesn't map to that — every actually-
    // ran sub-module is reparented under the synthetic leader node — so
    // the path is just those three ids. For the baseline 2-node tree we
    // walk the raw parent_id chain since that IS the rendered shape.
    if (!winId || !trial.graph) return new Set();
    if (trial.arm === "baseline") {
      const path = new Set();
      let cur = winId;
      while (cur) {
        path.add(cur);
        cur = trial.graph.nodes[cur]?.parent_id;
      }
      return path;
    }
    return new Set([trial.graph.root_id, "__leader__", winId]);
  }

  /* ---------- pane rendering ---------- */

  function clearPane(pane) {
    pane.linkLayer.selectAll("*").remove();
    pane.nodeLayer.selectAll("*").remove();
    pane.paneEl.querySelectorAll(".pane-empty").forEach(el => el.remove());
  }

  function renderEmptyPane(pane, msg) {
    clearPane(pane);
    const empty = document.createElement("div");
    empty.className = "pane-empty";
    empty.textContent = msg;
    pane.paneEl.appendChild(empty);
  }

  function renderPane(pane, trial) {
    pane.trial = trial;
    pane.collapsed = new Set();
    if (!trial) {
      renderEmptyPane(pane, "No trial selected for this pane.");
      pane.winId = null;
      return;
    }
    if (!trial.graph || !trial.graph.root_id) {
      // Mesmer crash before any module ran — nothing to draw. Baseline
      // trials always have a synthesized graph here, so this branch only
      // hits malformed mesmer trials.
      renderEmptyPane(pane,
        trial.arm === "baseline"
          ? "Baseline trial — no recorded send/receive (target call aborted)."
          : "No attack-graph snapshot was written for this trial."
      );
      pane.winId = null;
      return;
    }
    pane.winId = pickWinningNodeId(trial);
    drawTree(pane);
  }

  function buildPaneHierarchy(trial, collapsed) {
    // Baseline trials get the literal 2-node graph (root → baseline) we
    // synthesized server-side; the leader-timeline view doesn't apply.
    if (trial.arm === "baseline") {
      return buildHierarchy(trial.graph.nodes, trial.graph.root_id, collapsed);
    }
    return buildLeaderTimeline(trial.graph.nodes, trial.graph.root_id, collapsed);
  }

  function drawTree(pane) {
    const trial = pane.trial;
    clearPane(pane);
    const hData = buildPaneHierarchy(trial, pane.collapsed);
    if (!hData) return;
    const root = d3.hierarchy(hData);

    const nodeHSpace = 180;
    const nodeVSpace = 52;
    const treeLayout = d3.tree().nodeSize([nodeVSpace, nodeHSpace]);
    treeLayout(root);

    const winPath = winningPathIds(trial, pane.winId);

    pane.linkLayer.selectAll("path")
      .data(root.links(), d => `${d.source.data.id}->${d.target.data.id}`)
      .join("path")
      .attr("class", d =>
        "link" + (winPath.has(d.source.data.id) && winPath.has(d.target.data.id) ? " on-winning-path" : "")
      )
      .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));

    const nodeSel = pane.nodeLayer.selectAll("g")
      .data(root.descendants(), d => d.data.id)
      .join("g")
      .attr("class", d => {
        let cls = "node";
        if (d.data._isLeaderOrchestrator) cls += " leader-orchestrator";
        else if (isLeaderVerdict(d.data)) cls += " leader";
        else if (d.data.status === "dead") cls += " dead";
        if (d.data.id === pane.winId) cls += " winning";
        // Restore selected highlight after redraw if the user had one.
        if (_selectedNodeId && d.data.id === _selectedNodeId) cls += " selected";
        return cls;
      })
      .attr("transform", d => `translate(${d.y},${d.x})`)
      .on("click", (ev, d) => {
        ev.stopPropagation();
        _selectedNodeId = d.data.id;
        _selectedFromPane = pane === paneA ? "A" : "B";
        renderDetail(trial, d.data);
        // Clear selection in both panes, then highlight the right one.
        for (const p of [paneA, paneB]) {
          p.nodeLayer.selectAll("g.node").classed(
            "selected",
            (p === pane) ? (g => g.data.id === _selectedNodeId) : false
          );
        }
      });

    // Synthetic LEADER orchestrator → diamond. Sits between root and the
    // ran sub-modules so the orchestration pattern is explicit.
    nodeSel.filter(d => d.data._isLeaderOrchestrator)
      .append("polygon")
      .attr("points", "0,-14 14,0 0,14 -14,0");

    // Real sub-module attempts + root → circles.
    nodeSel.filter(d => !isLeaderVerdict(d.data) && !d.data._isLeaderOrchestrator)
      .append("circle")
      .attr("r", 14)
      .attr("fill", d => colorFor(trial, d.data))
      .attr("stroke", "rgba(255,255,255,.2)");

    // Leader-verdict (CONCLUDE node at run end) → square.
    nodeSel.filter(d => isLeaderVerdict(d.data))
      .append("rect")
      .attr("x", -14).attr("y", -14)
      .attr("width", 28).attr("height", 28).attr("rx", 3)
      .attr("fill", d => leaderVerdictColor(d.data))
      .attr("stroke", "rgba(255,255,255,.35)")
      .attr("stroke-width", 2);

    // Primary label under each node.
    nodeSel.append("text")
      .attr("y", 30).attr("text-anchor", "middle")
      .text(d => shortLabel(d.data));

    // Sequence number above the node — only on sub-modules the leader called.
    nodeSel.filter(d => typeof d.data._seqNum === "number")
      .append("text")
      .attr("class", "seq-num")
      .attr("y", -20).attr("text-anchor", "middle")
      .text(d => `#${d.data._seqNum}`);

    // Winner ★ badge — small, off to the side, replaces the previous
    // permanent halo so selection feedback dominates.
    nodeSel.filter(d => d.data.id === pane.winId)
      .append("text")
      .attr("class", "winner-badge")
      .attr("x", 18).attr("y", -8)
      .attr("text-anchor", "start")
      .text("★ winner");

    nodeSel.filter(d => d.data.source === "human")
      .append("text")
      .attr("class", "badge").attr("x", 0).attr("y", -18)
      .attr("text-anchor", "middle").text("★");

    nodeSel.filter(d => (d.data._childIds || []).length > (d.data.children || []).length)
      .append("text")
      .attr("class", "badge").attr("x", 18).attr("y", 5)
      .attr("text-anchor", "start").attr("fill", "var(--muted)")
      .text("+");

    nodeSel.on("dblclick", (ev, d) => {
      ev.stopPropagation();
      if (pane.collapsed.has(d.data.id)) pane.collapsed.delete(d.data.id);
      else pane.collapsed.add(d.data.id);
      drawTree(pane);
    });

    requestAnimationFrame(() => fitToView(pane, root));
  }

  /* ---------- pane labels ---------- */

  function setPaneLabel(pane, trial) {
    const isA = pane === paneA;
    const armEl = document.getElementById(isA ? "paneA-arm" : "paneB-arm");
    const infoEl = document.getElementById(isA ? "paneA-info" : "paneB-info");
    if (!trial) {
      armEl.textContent = "—"; armEl.className = "arm-tag";
      infoEl.textContent = "";
      return;
    }
    armEl.textContent = trial.arm.toUpperCase();
    armEl.className = "arm-tag " + trial.arm;
    const seed = (trial.seed == null) ? "—" : trial.seed;
    const okIcon = trial.success ? "✓" : (trial.error ? "!" : "✗");
    infoEl.textContent = ` · seed ${seed} · ${okIcon} ${trial.turns} turn${trial.turns === 1 ? "" : "s"}`;
  }

  /* ---------- top-level render ---------- */

  function renderCurrent() {
    const main = currentMainTrial();
    setBanner(main);

    if (_compare) {
      // Force baseline-on-top, mesmer-on-bottom regardless of arm dropdown.
      // Baseline has one row per sample_id; mesmer has N seeds, pick whichever
      // is currently selected (or the first one if user is on baseline arm).
      const baseline = findFirstTrialForArm({
        target: selT.value, arm: "baseline", sample_id: selR.value,
      });
      let mesmer = findTrial({
        target: selT.value, arm: "mesmer",
        sample_id: selR.value, seed: selS.value,
      });
      if (!mesmer) {
        mesmer = findFirstTrialForArm({
          target: selT.value, arm: "mesmer", sample_id: selR.value,
        });
      }
      renderPane(paneA, baseline);
      renderPane(paneB, mesmer);
      setPaneLabel(paneA, baseline);
      setPaneLabel(paneB, mesmer);
      // Side panel defaults to the user-selected arm's trial summary.
      const summaryFor = (selA.value === "baseline") ? baseline : mesmer;
      renderTrialMetaPanel(summaryFor);
    } else {
      renderPane(paneA, main);
      renderPane(paneB, null);
      setPaneLabel(paneA, main);
      setPaneLabel(paneB, null);
      renderTrialMetaPanel(main);
    }
  }

  /* ---------- detail panel: trial summary (default state) ---------- */

    if (!trial) {
      el.innerHTML = '<div class="empty-state">No trial selected.</div>';

      <h2>Trial summary</h2>

      <div class="row"><span>arm</span><b>${esc(trial.arm)}</b></div>
      ${trial.arm === "mesmer" ? `
        <div class="row"><span>attacker model</span><b class="long">${esc(trial.attacker_model || "—")}</b></div>
      ` : ""}
      <div class="row"><span>sample id</span><b>${esc(trial.sample_id)}</b></div>
      <div class="row"><span>seed</span><b>${trial.seed == null ? "—" : trial.seed}</b></div>
      <div class="row"><span>run id</span><b>${esc(trial.run_id || "").slice(0,12) || "—"}</b></div>

          <pre>${esc(trial.target_system_prompt)}</pre></details></section>` : ""}
      ${trial.target_user_turn_suffix ? `

          <pre>${esc(trial.target_user_turn_suffix)}</pre></details></section>` : ""}
      ${t.events_path ? `

    `;
  }

  /* ---------- detail panel: per-node ---------- */

  function renderDetail(trial, node) {
    // The synthetic LEADER orchestrator gets its own fixed explainer —
    // it's not a real node, it's a viz construct. Render that and exit.
    if (node._isLeaderOrchestrator) {
      renderLeaderOrchestratorPanel(trial, node);
      return;
    }

    const tier = tierOf(trial, node.module);
    const tierLbl = (tier === 0 || tier) ? `T${tier}` : "—";
    const isWinning = (
      (trial.trace?.winning_module === node.module || (trial.arm === "baseline" && node.module === "baseline"))
      && node.id === pickWinningNodeId(trial)
    );
    const el = document.getElementById("detail");
    const msgs = node.messages_sent || [];
    const resps = node.target_responses || [];
    const pairs = [];
    const n = Math.max(msgs.length, resps.length);
    for (let i = 0; i < n; i++) {
      pairs.push({ sent: msgs[i] ?? "", got: resps[i] ?? "" });
    }

    const modCfg = MODULES[node.module] || null;

    const winnerBanner = isWinning ? `
      <div class="winner-banner">
        <b>★ Winning node</b>
        First sub-module call whose target turn contained the canary substring.
        The trial's final verdict comes from the LEADER's concluded output, not
        this node — but this is where the leak originated.
      </div>
    ` : "";

    el.innerHTML = `
      <h2>${esc(node.module)}${typeof node._seqNum === "number" ? ` <span class="pill">#${node._seqNum}</span>` : ""}</h2>
      ${winnerBanner}
      <div class="row"><span>tier</span><b><span class="tier-dot" style="background:${colorFor(trial, node)}"></span>${tierLbl}</b></div>
      <div class="row"><span>score</span><b>${node.score ?? 0}</b></div>
      <div class="row"><span>status</span><b>${esc(node.status || "?")}</b></div>
      <div class="row"><span>source</span><b>${esc(node.source || "?")}</b></div>
      <div class="row"><span>depth</span><b>${node.depth ?? 0}</b></div>
      <div class="row"><span>node id</span><b>${esc(node.id).slice(0,12)}</b></div>
      <div class="row"><span>arm</span><b>${esc(trial.arm)}</b></div>
      ${trial.arm === "mesmer" ? `
        <div class="row"><span>attacker model</span><b class="long">${esc(trial.attacker_model || "—")}</b></div>
      ` : ""}
      <div class="row"><span>target model</span><b class="long">${esc(trial.target_model || "—")}</b></div>
      ${node.approach ? `
        <section>
          <h3>Instruction
            <span class="h-tag">delegate.approach</span></h3>
          <pre>${esc(node.approach)}</pre>
        </section>` : ""}
      ${pairs.length ? `
        <section><h3>Exchange <span class="h-tag">target round-trips</span></h3>
          ${pairs.map((p, i) => `
            ${p.sent ? `<div class="msg me"><span class="lbl">attacker → target · turn ${i+1}</span>${esc(p.sent)}</div>` : ""}
            ${p.got ? `<div class="msg them"><span class="lbl">target → attacker</span>${esc(p.got)}</div>` : ""}
          `).join("")}
        </section>` : ""}
      ${node.leaked_info ? `
        <section><h3>Leaked info <span class="h-tag">judge extract</span></h3>
          <div class="leaked">🎯 ${esc(node.leaked_info)}</div></section>` : ""}
      ${node.reflection ? `
        <section><h3>Reflection</h3><pre>${esc(node.reflection)}</pre></section>` : ""}
      ${node.module_output ? `
        <section><h3>Module output (conclude)</h3><pre>${esc(node.module_output)}</pre></section>` : ""}
      ${modCfg ? renderModuleConfig(modCfg) : ""}
      ${trial.target_system_prompt ? `
        <section><h3>Target defense — system prompt</h3>
          <details><summary>show full system prompt (${trial.target_system_prompt.length} chars)</summary>
          <pre>${esc(trial.target_system_prompt)}</pre></details></section>` : ""}
      ${!node.approach && !pairs.length && !node.leaked_info && !node.reflection && !node.module_output && !modCfg
        ? '<div class="empty">No data captured for this node.</div>' : ""}
    `;
  }

  function renderLeaderOrchestratorPanel(trial, node) {
    const el = document.getElementById("detail");
    const ranCount = (node.children || []).filter(
      c => c.source !== "leader"
    ).length;
    const verdict = (node.children || []).find(c => c.source === "leader");
    const verdictText = verdict
      ? (verdict.status === "promising" ? "✓ objective met" : "✗ no consolidation")
      : "(no verdict node)";
    el.innerHTML = `
      <h2>leader <span class="pill">${esc(trial.arm)}</span></h2>
      <div class="info-banner" style="border-color:var(--accent);background:rgba(122,162,247,.08);color:#cdd6f4">
        <b style="color:var(--accent)">Synthetic node — viz construct</b>
        The leader is mesmer's orchestration loop. It picks the next sub-module
        from the current plan, delegates to it, reads the judge verdict, then
        loops until the objective is met or the turn budget is exhausted.
        Sub-modules below this node are listed in the order the leader actually
        called them.
      </div>
      <div class="row"><span>module</span><b class="long">${esc(trial.target_model || "—")}'s leader run</b></div>
      <div class="row"><span>real delegations</span><b>${ranCount}</b></div>
      <div class="row"><span>verdict</span><b>${verdictText}</b></div>

      ` : ""}
      <section>
        <h3>How to read this view</h3>
        <pre>The graph is laid out as the leader's call timeline:

  root ─▶ LEADER ─▶ #1 first delegation
                   ▶ #2 second delegation
                   ▶ ...
                   ▶ leader-verdict  (square — run terminator)

Solid coloured circles are real delegations the leader made.
Click any node for its full instruction + module config + exchange.</pre>

  function renderModuleConfig(cfg) {
    const tierLbl = (cfg.tier === 0 || cfg.tier) ? `T${cfg.tier}` : "—";
    return `
      <section>
        <h3>Module config <span class="h-tag">${esc(cfg.name)} · ${tierLbl}</span></h3>
        ${cfg.description ? `
          <details open><summary>description</summary>
          <pre>${esc(cfg.description)}</pre></details>` : ""}
        ${cfg.theory ? `
          <details><summary>theory</summary>
          <pre>${esc(cfg.theory)}</pre></details>` : ""}
        ${cfg.system_prompt ? `
          <details><summary>system_prompt (${cfg.system_prompt.length} chars)</summary>
          <pre>${esc(cfg.system_prompt)}</pre></details>` : ""}
        ${cfg.judge_rubric ? `
          <details><summary>judge_rubric</summary>
          <pre>${esc(cfg.judge_rubric)}</pre></details>` : ""}
        ${(cfg.sub_modules || []).length ? `
          <div class="row"><span>sub_modules</span><b class="long">${esc(cfg.sub_modules.join(", "))}</b></div>` : ""}
        <div class="row"><span>reset_target</span><b>${cfg.reset_target ? "true" : "false"}</b></div>
      </section>
    `;
  }

  /* ---------- toolbars (per-pane) ---------- */

  document.querySelectorAll(".pane-toolbar button").forEach(btn => {
    btn.addEventListener("click", (ev) => {
      const which = btn.getAttribute("data-pane");
      const act = btn.getAttribute("data-act");
      const pane = (which === "A") ? paneA : paneB;
      if (!pane.trial || !pane.trial.graph) return;
      if (act === "fit") {
        const hData = buildPaneHierarchy(pane.trial, pane.collapsed);
        if (!hData) return;
        const root = d3.hierarchy(hData);
        d3.tree().nodeSize([52, 180])(root);
        fitToView(pane, root);
      } else if (act === "expand") {
        pane.collapsed = new Set();
        drawTree(pane);
      } else if (act === "collapse") {
        pane.collapsed = new Set();
        // Collapse every sub-module branch to leave a clean leader-timeline
        // of real delegations.
        for (const [id, n] of Object.entries(pane.trial.graph.nodes)) {
          if ((n.children || []).length && n.source !== "leader") {
            pane.collapsed.add(id);
          }
        }
        drawTree(pane);
      }
    });
  });

  /* ---------- boot ---------- */

  renderCurrent();
})();
</script>
</body>
</html>
